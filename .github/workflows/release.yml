name: Auto GitHub Release

on:
    push:
        branches:
            - master
        paths:
            - package.json

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check package.json version change
              id: version_check
              shell: bash
              run: |
                  if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                      echo "No previous commit to compare."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  prev_version="$(git show HEAD^:package.json | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).version));")"
                  curr_version="$(node -e "const fs=require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('package.json', 'utf8')).version);")"

                  echo "Previous version: $prev_version"
                  echo "Current version: $curr_version"

                  if [ "$prev_version" = "$curr_version" ]; then
                      echo "Version unchanged. Skip release."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  echo "should_release=true" >> "$GITHUB_OUTPUT"
                  echo "new_version=$curr_version" >> "$GITHUB_OUTPUT"
                  echo "release_tag=v$curr_version" >> "$GITHUB_OUTPUT"

            - name: Create or update GitHub Release
              if: steps.version_check.outputs.should_release == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version_check.outputs.release_tag }}
                  name: ${{ steps.version_check.outputs.release_tag }}
                  generate_release_notes: true
